services:
  - type: web
    name: skybound-auth
    env: node
    region: oregon
    plan: free
    buildCommand: yarn install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: skybound-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: BASE_URL
        value: https://skybound-auth.onrender.com  # change to your actual URL
      - key: CORS_ORIGINS
        value: https://skybound-auth.onrender.com

databases:
  - name: skybound-db
    databaseName: skybound
    user: skybound
    plan: free
